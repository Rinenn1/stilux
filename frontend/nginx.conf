server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /wardrobe/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /chat/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /profile/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /wear-log/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
