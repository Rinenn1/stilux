# fly.toml app configuration file generated for ai-adviser-frontend on 2026-05-09T22:54:38+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-adviser-frontend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  VITE_API_BASE_URL = 'https://ai-adviser-backend.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
