services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adviser
      POSTGRES_PASSWORD: adviser
      POSTGRES_DB: ai_adviser
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://adviser:adviser@db:5432/ai_adviser
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
