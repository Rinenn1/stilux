<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#15110f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#43d9b8"/>
      <stop offset="1" stop-color="#d6a85f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="28" y="28" width="1384" height="844" rx="28" fill="#111820" stroke="#26313b"/>
  <rect x="28" y="28" width="244" height="844" rx="28" fill="#0d1218"/>
  <rect x="62" y="67" width="44" height="44" rx="12" fill="url(#accent)"/>
  <text x="121" y="96" fill="#f4f0e8" font-family="Inter, Arial" font-size="23" font-weight="700">FashionAI</text>
  <text x="62" y="155" fill="#758391" font-family="Inter, Arial" font-size="12" letter-spacing="2">STYLE OS</text>
  <rect x="52" y="184" width="184" height="48" rx="14" fill="#17352f"/>
  <text x="82" y="215" fill="#eafff8" font-family="Inter, Arial" font-size="15" font-weight="700">Chat</text>
  <text x="82" y="272" fill="#8a97a5" font-family="Inter, Arial" font-size="15">Wardrobe</text>
  <text x="82" y="326" fill="#8a97a5" font-family="Inter, Arial" font-size="15">Wear Log</text>
  <text x="82" y="380" fill="#8a97a5" font-family="Inter, Arial" font-size="15">Profile</text>
  <rect x="58" y="721" width="172" height="86" rx="18" fill="#141d25" stroke="#26313b"/>
  <text x="78" y="751" fill="#f0d49a" font-family="Inter, Arial" font-size="13" font-weight="700">Tonight</text>
  <text x="78" y="777" fill="#8b98a6" font-family="Inter, Arial" font-size="12">Dinner, 22C, dry</text>
  <text x="78" y="796" fill="#8b98a6" font-family="Inter, Arial" font-size="12">3 looks ready</text>
  <text x="318" y="88" fill="#f4f0e8" font-family="Inter, Arial" font-size="31" font-weight="800">Personal adviser</text>
  <text x="318" y="119" fill="#8c9aa8" font-family="Inter, Arial" font-size="15">Ask for an occasion. Get outfits from your actual wardrobe.</text>
  <rect x="1046" y="58" width="304" height="48" rx="16" fill="#151e27" stroke="#293642"/>
  <circle cx="1074" cy="82" r="9" fill="#43d9b8"/>
  <text x="1094" y="88" fill="#dce7ef" font-family="Inter, Arial" font-size="14">42 wardrobe items indexed</text>
  <rect x="318" y="164" width="640" height="78" rx="22" fill="#1a242d" stroke="#2b3742"/>
  <text x="348" y="195" fill="#eef4f2" font-family="Inter, Arial" font-size="15">What should I wear to a casual dinner tonight?</text>
  <text x="348" y="221" fill="#71808d" font-family="Inter, Arial" font-size="12">You</text>
  <rect x="382" y="279" width="680" height="132" rx="24" fill="#111820" stroke="#2b3742"/>
  <text x="414" y="316" fill="#f3eee6" font-family="Inter, Arial" font-size="16" font-weight="700">Start with polished ease.</text>
  <text x="414" y="346" fill="#b9c4cc" font-family="Inter, Arial" font-size="15">I would keep it relaxed but intentional: clean knitwear, tailored trousers,</text>
  <text x="414" y="371" fill="#b9c4cc" font-family="Inter, Arial" font-size="15">and one warm accent. I avoided anything you wore this week.</text>
  <rect x="382" y="445" width="900" height="244" rx="26" fill="#151e26" stroke="#2c3943" filter="url(#shadow)"/>
  <rect x="410" y="473" width="146" height="188" rx="18" fill="#29323a"/>
  <rect x="430" y="494" width="106" height="68" rx="16" fill="#c8d6ce"/>
  <rect x="443" y="574" width="80" height="58" rx="14" fill="#24211f"/>
  <rect x="445" y="641" width="76" height="12" rx="6" fill="#d2a866"/>
  <text x="588" y="495" fill="#43d9b8" font-family="Inter, Arial" font-size="12" font-weight="800" letter-spacing="1.6">OUTFIT 1</text>
  <text x="588" y="529" fill="#f5f1eb" font-family="Inter, Arial" font-size="22" font-weight="800">Ivory knit, charcoal trouser, tan loafer</text>
  <text x="588" y="564" fill="#b9c4cc" font-family="Inter, Arial" font-size="15">Soft contrast, dinner-appropriate, and still casual enough for a relaxed room.</text>
  <text x="588" y="590" fill="#b9c4cc" font-family="Inter, Arial" font-size="15">The tan shoe warms up the monochrome base without getting loud.</text>
  <rect x="588" y="624" width="132" height="42" rx="14" fill="url(#accent)"/>
  <text x="619" y="651" fill="#07100e" font-family="Inter, Arial" font-size="14" font-weight="800">Wear this</text>
  <rect x="740" y="624" width="150" height="42" rx="14" fill="#202b34" stroke="#34424d"/>
  <text x="768" y="651" fill="#d7e1e8" font-family="Inter, Arial" font-size="14" font-weight="700">Swap shoes</text>
  <rect x="924" y="476" width="322" height="176" rx="20" fill="#10171e" stroke="#26313b"/>
  <text x="948" y="511" fill="#91a0ad" font-family="Inter, Arial" font-size="12" font-weight="700" letter-spacing="1.4">WHY IT WORKS</text>
  <text x="948" y="545" fill="#dbe5eb" font-family="Inter, Arial" font-size="14">Balanced contrast</text>
  <text x="948" y="574" fill="#dbe5eb" font-family="Inter, Arial" font-size="14">No recently worn pieces</text>
  <text x="948" y="603" fill="#dbe5eb" font-family="Inter, Arial" font-size="14">Lightweight enough for evening</text>
  <rect x="318" y="738" width="978" height="66" rx="22" fill="#0e151c" stroke="#2d3944"/>
  <text x="351" y="778" fill="#71808d" font-family="Inter, Arial" font-size="16">Ask your fashion adviser...</text>
  <rect x="1214" y="752" width="62" height="38" rx="14" fill="#43d9b8"/>
  <text x="1231" y="777" fill="#061210" font-family="Inter, Arial" font-size="14" font-weight="900">Send</text>
</svg>
